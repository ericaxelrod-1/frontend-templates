<h2 mat-dialog-title>Edit Permissions for Group: {{ group.name }}</h2>

<div mat-dialog-content>
  <div class="permission-dialog-content">
    <!-- Filter input -->
    <div class="search-container">
      <mat-form-field appearance="outline" class="search-field">
        <mat-label>Search permissions</mat-label>
        <input matInput [formControl]="searchControl" placeholder="Search by name, resource, or action">
        <mat-icon matSuffix>search</mat-icon>
      </mat-form-field>
      
      <div class="action-buttons">
        <button mat-stroked-button color="primary" (click)="selectAll()">
          <mat-icon>select_all</mat-icon> Select All
        </button>
        <button mat-stroked-button color="warn" (click)="deselectAll()">
          <mat-icon>clear_all</mat-icon> Deselect All
        </button>
      </div>
    </div>
    
    <!-- Permissions by resource -->
    <div class="permissions-container">
      <mat-accordion>
        <mat-expansion-panel *ngFor="let resource of resourceNames">
          <mat-expansion-panel-header>
            <mat-panel-title>
              {{ resource | titlecase }}
            </mat-panel-title>
            <mat-panel-description>
              {{ getSelectedPermissionCountForResource(resource) }} / {{ getResourcePermissionCount(resource) }} permissions
            </mat-panel-description>
          </mat-expansion-panel-header>
          
          <div class="resource-actions">
            <button mat-button color="primary" (click)="selectAllInResource(resource)">
              <mat-icon>check_box</mat-icon> Select All
            </button>
            <button mat-button color="warn" (click)="deselectAllInResource(resource)">
              <mat-icon>indeterminate_check_box</mat-icon> Deselect All
            </button>
          </div>
          
          <mat-selection-list [multiple]="true" (selectionChange)="onSelectionChange($event)">
            <mat-list-option *ngFor="let permission of permissionsByResource[resource]"
                             [selected]="isPermissionSelected(permission)"
                             [value]="permission.id"
                             checkboxPosition="before">
              <div class="permission-item">
                <div class="permission-name">{{ permission.name }}</div>
                <div class="permission-description" *ngIf="permission.description">
                  {{ permission.description }}
                </div>
                <div class="permission-action">
                  <span class="tag">{{ permission.actionName }}</span>
                </div>
              </div>
            </mat-list-option>
          </mat-selection-list>
        </mat-expansion-panel>
      </mat-accordion>
    </div>
  </div>
</div>

<div mat-dialog-actions align="end">
  <button mat-button (click)="onCancelClick()">Cancel</button>
  <button mat-raised-button color="primary" [disabled]="!hasChanges()" (click)="onSaveClick()">
    Save Changes
  </button>
</div>
