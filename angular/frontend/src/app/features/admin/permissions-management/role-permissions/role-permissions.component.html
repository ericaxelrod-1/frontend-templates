<div class="container">
  <div class="header">
    <h1>Role Permissions</h1>
    <button mat-raised-button color="primary" (click)="refreshData()" *appHasPermission="'permissions:refresh'">
      <mat-icon>refresh</mat-icon> Refresh
    </button>
  </div>

  <mat-form-field appearance="outline" class="filter-field">
    <mat-label>Filter roles</mat-label>
    <input matInput [formControl]="filterControl" placeholder="Filter by name or description">
    <mat-icon matSuffix>search</mat-icon>
  </mat-form-field>

  <div class="table-container">
    <table mat-table [dataSource]="dataSource" matSort>
      <!-- Name Column -->
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Name </th>
        <td mat-cell *matCellDef="let role"> {{role.name}} </td>
      </ng-container>

      <!-- Description Column -->
      <ng-container matColumnDef="description">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Description </th>
        <td mat-cell *matCellDef="let role"> {{role.description || 'No description'}} </td>
      </ng-container>

      <!-- Permission Count Column -->
      <ng-container matColumnDef="permissionCount">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Permissions </th>
        <td mat-cell *matCellDef="let role"> 
          <span class="chip" *ngIf="role.permissions?.length">
            {{role.permissions?.length || 0}} permissions
          </span>
          <span class="chip empty" *ngIf="!role.permissions?.length">
            No permissions
          </span>
        </td>
      </ng-container>

      <!-- Actions Column -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef> Actions </th>
        <td mat-cell *matCellDef="let role">
          <button mat-icon-button color="primary" (click)="openEditDialog(role)" *appHasPermission="'permissions:edit'">
            <mat-icon>edit</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      <!-- Row shown when no data matches the filter -->
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell" colspan="4">No roles found</td>
      </tr>
    </table>

    <mat-paginator [pageSizeOptions]="[5, 10, 25, 100]" showFirstLastButtons></mat-paginator>
  </div>
</div>
