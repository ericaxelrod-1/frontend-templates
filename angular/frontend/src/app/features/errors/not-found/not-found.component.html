<div class="container">
  <div class="row justify-content-center mt-5">
    <div class="col-md-8 text-center">
      <div class="card border-info">
        <div class="card-header bg-info text-white">
          <h1 class="mb-0">
            <i class="bi bi-question-circle me-2"></i>
            Page Not Found
          </h1>
        </div>
        <div class="card-body">
          <div class="my-5">
            <i class="bi bi-search text-info" style="font-size: 5rem;"></i>
          </div>
          
          <h1 class="display-1 mb-3">404</h1>
          
          <h2 class="mb-3">Oops! We couldn't find that page</h2>
          
          <p class="lead mb-4">
            The page you are looking for might have been removed, had its name changed,
            or is temporarily unavailable.
          </p>
          
          <div class="d-grid gap-2 d-md-flex justify-content-md-center mt-4">
            <button class="btn btn-outline-secondary btn-lg me-md-2" (click)="goBack()">
              <i class="bi bi-arrow-left me-2"></i>
              Go Back
            </button>
            
            <button class="btn btn-primary btn-lg" (click)="goToHome()">
              <i class="bi bi-house-door me-2"></i>
              Go to Home
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
