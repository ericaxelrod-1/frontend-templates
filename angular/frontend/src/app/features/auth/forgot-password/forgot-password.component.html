<div class="forgot-password-container">
  <div class="forgot-password-card">
    <div class="logo-container">
      <img *ngIf="landingLogo" [src]="landingLogo" alt="{{appName}} Logo" class="app-logo">
      <h1 *ngIf="!landingLogo">{{appName}}</h1>
    </div>
    
    <h2>Forgot Password</h2>
    
    <div *ngIf="success" class="alert alert-success">
      <mat-icon>check_circle</mat-icon>
      <span *ngIf="!isMatIconsLoaded" class="fallback-icon">✓</span>
      Password reset instructions have been sent to your email address.
    </div>
    
    <form *ngIf="!success" [formGroup]="forgotPasswordForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Email</label>
        <div class="input-with-icon">
          <input 
            type="email" 
            id="email" 
            formControlName="email" 
            class="form-control" 
            [ngClass]="{ 'is-invalid': submitted && f['email'].errors }"
            placeholder="Enter your email address"
            matTooltip="Enter the email address associated with your account"
          />
          <mat-icon class="visibility-icon">email</mat-icon>
          <span *ngIf="!isMatIconsLoaded" class="fallback-icon">📧</span>
        </div>
        <div *ngIf="submitted && f['email'].errors" class="invalid-feedback">
          <div *ngIf="f['email'].errors['required']">Email is required</div>
          <div *ngIf="f['email'].errors['email']">Please enter a valid email address</div>
        </div>
      </div>
      
      <div class="form-group">
        <button [disabled]="loading" class="btn btn-primary btn-block">
          <span *ngIf="loading" class="spinner-border spinner-border-sm mr-1"></span>
          Reset Password
        </button>
      </div>
      
      <div *ngIf="error" class="alert alert-danger mt-3">
        <mat-icon>error</mat-icon>
        <span *ngIf="!isMatIconsLoaded" class="fallback-icon">⚠️</span>
        {{error}}
      </div>
      
      <div class="mt-3 text-center">
        <p>Remember your password? <a routerLink="/login">Login</a></p>
      </div>
    </form>
    
    <div *ngIf="success" class="mt-3 text-center">
      <p>Return to <a routerLink="/login">Login</a></p>
    </div>
  </div>
</div>
