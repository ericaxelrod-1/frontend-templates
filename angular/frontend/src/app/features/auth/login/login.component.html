<div class="login-container">
  <div class="login-card">
    <div class="logo-container">
      <img [src]="landingLogo" alt="App Logo" class="app-logo">
    </div>
    <h2>{{ appName }}</h2>
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" autocomplete="on">
      <div class="form-group">
        <label for="email">Email</label>
        <input 
          type="email" 
          id="email" 
          formControlName="email" 
          class="form-control" 
          [ngClass]="{ 'is-invalid': submitted && f['email'].errors }"
          autocomplete="email"
          placeholder="Enter your email"
        />
        <div *ngIf="submitted && f['email'].errors" class="invalid-feedback">
          <div *ngIf="f['email'].errors['required']">Email is required</div>
          <div *ngIf="f['email'].errors['email']">Please enter a valid email address</div>
        </div>
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          formControlName="password" 
          class="form-control" 
          [ngClass]="{ 'is-invalid': submitted && f['password'].errors }"
          autocomplete="current-password"
          placeholder="Enter your password"
        />
        <div *ngIf="submitted && f['password'].errors" class="invalid-feedback">
          <div *ngIf="f['password'].errors['required']">Password is required</div>
        </div>
      </div>
      
      <div class="form-group">
        <button
          type="submit"
          class="btn btn-primary btn-block"
          [disabled]="loading"
          id="login-button">
          <span
            *ngIf="loading"
            class="spinner-border spinner-border-sm mr-1">
          </span>
          Login
        </button>
      </div>
      
      <div *ngIf="error" class="alert alert-danger mt-3">{{error}}</div>
      
      <div class="mt-3 text-center">
        <a (click)="navigateToForgotPassword()" style="cursor: pointer;">Forgot Password?</a>
      </div>
      
      <div class="mt-3 text-center">
        <p>Don't have an account? <button class="btn-link" (click)="navigateToRegister()">Register</button></p>
      </div>
    </form>
  </div>
</div>
