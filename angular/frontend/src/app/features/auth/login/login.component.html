<div class="login-container">
  <div class="login-card">
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">

      <div class="login-content-wrapper">
        <!-- Main Login Section: Logo, Fields, and Actions -->
        <div class="login-main-section">
          <div class="logo-container">
            <img [src]="landingLogo" [alt]="appName + ' Logo'" class="logo-image">
          </div>

          <!-- Credentials -->
          <mat-form-field appearance="outline" class="full-width-field">
            <mat-label>Email</mat-label>
            <input matInput type="email" formControlName="email" id="email" placeholder="Enter your email address"
              autocomplete="email">
            <mat-error *ngIf="f['email'].errors?.['required']">Email is required</mat-error>
            <mat-error *ngIf="f['email'].errors?.['email']">Please enter a valid email address</mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width-field">
            <mat-label>Password</mat-label>
            <input matInput type="password" formControlName="password" id="password" placeholder="Enter your password"
              autocomplete="current-password">
            <mat-error *ngIf="f['password'].errors?.['required']">Password is required</mat-error>
          </mat-form-field>

          <!-- Error Alert -->
          <div *ngIf="error" class="alert alert-danger">
            {{ error }}
          </div>

          <!-- Submit Action -->
          <div class="form-group submit-action">
            <button type="submit" mat-flat-button color="primary" class="full-width-btn" [disabled]="loading">
              <span *ngIf="loading" class="spinner-border spinner-border-sm me-1"></span>
              Sign In
            </button>
          </div>

          <!-- Help Links -->
          <div class="help-links">
            <button type="button" mat-button color="primary" (click)="navigateToForgotPassword()">Forgot
              Password?</button>
            <button type="button" mat-button color="primary" (click)="navigateToRegister()">Create an Account</button>
          </div>
        </div>

        <!-- Security Section: CAPTCHA -->
        <div class="login-security-section" *ngIf="captchaEnabled">
          <div class="form-group captcha-container">
            <label>Verify you're human</label>
            <app-standard-captcha #captcha formControlName="captcha"
              [ngClass]="{ 'is-invalid': submitted && f['captcha'].errors }">
            </app-standard-captcha>
            <div *ngIf="submitted && f['captcha'].errors" class="invalid-feedback">
              <div *ngIf="f['captcha'].hasError('required')">CAPTCHA verification is required</div>
            </div>
          </div>
        </div>
      </div>

    </form>
  </div>
</div>
