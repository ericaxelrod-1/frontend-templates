<div class="login-container">
  <div class="login-card">
    <div class="logo-container">
      <img [src]="landingLogo" [alt]="appName + ' Logo'" class="logo-image">
    </div>
    <h1 class="login-title">Sign in to your account</h1>
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input 
          type="email" 
          formControlName="email" 
          id="email" 
          class="form-control" 
          [ngClass]="{ 'is-invalid': submitted && f['email'].errors }"
          placeholder="Enter your email"
          autocomplete="email">
        <div *ngIf="submitted && f['email'].errors" class="invalid-feedback">
          <div *ngIf="f['email'].errors['required']">Email is required</div>
          <div *ngIf="f['email'].errors['email']">Please enter a valid email address</div>
        </div>
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          formControlName="password" 
          id="password" 
          class="form-control" 
          [ngClass]="{ 'is-invalid': submitted && f['password'].errors }"
          placeholder="Enter your password"
          autocomplete="current-password">
        <div *ngIf="submitted && f['password'].errors" class="invalid-feedback">
          <div *ngIf="f['password'].errors['required']">Password is required</div>
        </div>
      </div>
      
      <div class="form-group captcha-container" *ngIf="captchaEnabled">
        <label>Verify you're human</label>
        <app-captcha-selector 
          #captchaSelector
          formControlName="captcha"
          [ngClass]="{ 'is-invalid': submitted && f['captcha'].errors }">
        </app-captcha-selector>
        <div *ngIf="submitted && f['captcha'].errors" class="invalid-feedback">
          <div *ngIf="f['captcha'].errors['required']">CAPTCHA verification is required</div>
        </div>
      </div>
      
      <div class="form-group">
        <button 
          type="submit" 
          class="btn btn-primary btn-block" 
          [disabled]="loading">
          <span *ngIf="loading" class="spinner-border spinner-border-sm me-1"></span>
          Sign In
        </button>
      </div>
      
      <div *ngIf="error" class="alert alert-danger">
        {{ error }}
      </div>
      
      <div class="help-links">
        <button type="button" class="btn btn-link" (click)="navigateToForgotPassword()">Forgot Password?</button>
        <button type="button" class="btn btn-link" (click)="navigateToRegister()">Create an Account</button>
      </div>
    </form>
  </div>
</div>
