<div class="reset-password-container">
  <div class="reset-password-card">
    <div class="logo-container">
      <img *ngIf="landingLogo" [src]="landingLogo" alt="{{appName}} Logo" class="app-logo">
      <h1 *ngIf="!landingLogo">{{appName}}</h1>
    </div>
    
    <h2>Reset Password</h2>
    
    <div *ngIf="success" class="alert alert-success">
      Your password has been reset successfully.
    </div>
    
    <div *ngIf="error" class="alert alert-danger">
      {{error}}
    </div>
    
    <form *ngIf="!success && !error" [formGroup]="resetPasswordForm" (ngSubmit)="onSubmit()" autocomplete="on">
      <div class="form-group">
        <label for="password">New Password</label>
        <input 
          type="password" 
          id="password" 
          formControlName="password" 
          class="form-control" 
          [ngClass]="{ 'is-invalid': submitted && f['password'].errors }"
          autocomplete="new-password"
          placeholder="Enter new password"
        />
        <div *ngIf="submitted && f['password'].errors" class="invalid-feedback">
          <div *ngIf="f['password'].errors['required']">Password is required</div>
          <div *ngIf="f['password'].errors['minlength']">Password must be at least 8 characters</div>
        </div>
      </div>
      
      <div class="form-group">
        <label for="passwordConfirmation">Confirm Password</label>
        <input 
          type="password" 
          id="passwordConfirmation" 
          formControlName="passwordConfirmation" 
          class="form-control" 
          [ngClass]="{ 'is-invalid': submitted && (f['passwordConfirmation'].errors || resetPasswordForm.hasError('mismatch')) }"
          autocomplete="new-password"
          placeholder="Confirm new password"
        />
        <div *ngIf="submitted && (f['passwordConfirmation'].errors || resetPasswordForm.hasError('mismatch'))" class="invalid-feedback">
          <div *ngIf="f['passwordConfirmation'].errors?.['required']">Password confirmation is required</div>
          <div *ngIf="resetPasswordForm.hasError('mismatch')">Passwords must match</div>
        </div>
      </div>
      
      <div class="form-group">
        <button [disabled]="loading" class="btn btn-primary btn-block">
          <span *ngIf="loading" class="spinner-border spinner-border-sm mr-1"></span>
          Reset Password
        </button>
      </div>
    </form>
    
    <div class="mt-3 text-center">
      <p>Back to <a routerLink="/login">Login</a></p>
    </div>
  </div>
</div>
