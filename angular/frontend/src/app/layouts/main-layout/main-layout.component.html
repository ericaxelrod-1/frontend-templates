<div class="app-container">
  <!-- Only show header with sidebar toggle functionality on protected pages -->
  <app-header *ngIf="!isAuthPage" (sidebarToggle)="toggleSidebar()"></app-header>
  
  <!-- Use the simple header for auth pages -->
  <div *ngIf="isAuthPage" class="auth-header">
    <div class="logo">Angular Template</div>
  </div>
  
  <mat-sidenav-container class="sidenav-container" [ngClass]="{'auth-sidenav-container': isAuthPage}">
    <!-- Only show sidebar on protected pages -->
    <mat-sidenav *ngIf="!isAuthPage" 
                 [opened]="sidebarOpened" 
                 mode="side" 
                 class="sidebar">
      <app-sidebar></app-sidebar>
    </mat-sidenav>
    
    <!-- Adjust content classes based on page type -->
    <mat-sidenav-content [ngClass]="{'main-content': !isAuthPage, 'auth-content': isAuthPage}">
      <div class="content-wrapper">
        <router-outlet></router-outlet>
      </div>
      <app-footer [isAuthPage]="isAuthPage"></app-footer>
    </mat-sidenav-content>
  </mat-sidenav-container>
</div>
