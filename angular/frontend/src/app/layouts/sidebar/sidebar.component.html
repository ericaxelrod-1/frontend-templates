<mat-nav-list>
  <div class="sidebar-header">
    <h2>Menu</h2>
  </div>
  
  <!-- Common navigation items -->
  <ng-container *ngFor="let item of commonNavItems">
    <!-- Show item if it has no permission requirement or if user has the required permission -->
    <a mat-list-item 
       *ngIf="!item.permission || hasPermission(item.permission)" 
       [routerLink]="item.route" 
       routerLinkActive="active-link">
      <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
      <span matListItemTitle>{{ item.label }}</span>
    </a>
  </ng-container>
  
  <!-- Admin navigation items for users with management permissions -->
  <ng-container *ngIf="isAdminOrManager">
    <ng-container *ngFor="let item of adminNavItems">
      <a mat-list-item 
         *ngIf="hasPermission(item.permission)" 
         [routerLink]="item.route" 
         routerLinkActive="active-link">
        <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
        <span matListItemTitle>{{ item.label }}</span>
      </a>
    </ng-container>
  </ng-container>
  
  <!-- Admin Section (only visible to users with admin access) -->
  <ng-container *ngIf="hasAdminAccess()">
    <mat-divider class="section-divider"></mat-divider>
    
    <div class="sidebar-section">
      <h3>Admin</h3>
    </div>
    
    <ng-container *ngFor="let item of adminItems">
      <a mat-list-item 
         *ngIf="hasPermission(item.permission)" 
         [routerLink]="item.route" 
         routerLinkActive="active-link">
        <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
        <span matListItemTitle>{{ item.label }}</span>
      </a>
    </ng-container>
  </ng-container>
  
  <mat-divider class="section-divider"></mat-divider>
  
  <div class="sidebar-section">
    <h3>Account</h3>
  </div>
  
  <a mat-list-item 
     [routerLink]="'/profile'" 
     routerLinkActive="active-link">
    <mat-icon matListItemIcon>person</mat-icon>
    <span matListItemTitle>My Profile</span>
  </a>
  
  <a mat-list-item 
     [routerLink]="'/profile'" 
     [fragment]="'delete-account'"
     class="delete-account-link">
    <mat-icon matListItemIcon>delete_forever</mat-icon>
    <span matListItemTitle>Delete Account</span>
  </a>
</mat-nav-list>
