<mat-toolbar color="primary">
  <button mat-icon-button class="menu-button" (click)="toggleSidebar()">
    <mat-icon>menu</mat-icon>
  </button>
  
  <span class="app-title">Angular Template</span>
  
  <span class="spacer"></span>
  
  <ng-container *ngIf="isAuthenticated; else loginButton">
    <button mat-icon-button routerLink="/auth/profile">
      <mat-icon>account_circle</mat-icon>
    </button>
    
    <button mat-icon-button [matMenuTriggerFor]="userMenu">
      <mat-icon>more_vert</mat-icon>
    </button>
    
    <mat-menu #userMenu="matMenu">
      <div class="user-menu-header" *ngIf="user">
        <p class="user-name">{{ user.firstName || 'User' }} {{ user.lastName || '' }}</p>
        <p class="user-email">{{ user.email }}</p>
      </div>
      <button mat-menu-item routerLink="/auth/profile">
        <mat-icon>person</mat-icon>
        <span>Profile</span>
      </button>
      <button mat-menu-item>
        <mat-icon>settings</mat-icon>
        <span>Settings</span>
      </button>
      <mat-divider></mat-divider>
      <button mat-menu-item (click)="logout()">
        <mat-icon>exit_to_app</mat-icon>
        <span>Log out</span>
      </button>
    </mat-menu>
  </ng-container>
  
  <ng-template #loginButton>
    <button mat-button routerLink="/auth/login">
      <mat-icon>login</mat-icon>
      <span>Login</span>
    </button>
    <button mat-button routerLink="/auth/register">
      <mat-icon>person_add</mat-icon>
      <span>Register</span>
    </button>
  </ng-template>
</mat-toolbar>
