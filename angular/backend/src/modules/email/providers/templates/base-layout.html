<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}}</title>
  <style>
    body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; margin: 0; padding: 0; }
    .container { max-width: 600px; margin: 0 auto; padding: 20px; }
    .header { .header { background-color: #3f51b5; color: #ffffff;  padding: 20px; text-align: center; }
    .content { padding: 20px; background-color: #f9f9f9; }
    .button { display: inline-block; background-color: #ff9800; color: #ffffff !important; text-decoration: none; padding: 10px 20px; margin: 20px 0; border-radius: 4px; font-weight: bold; }
    .footer { text-align: center; font-size: 12px; color: #666; margin-top: 20px; }
    .token { background-color: #eee; padding: 10px; font-family: monospace; margin: 10px 0; word-break: break-all; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>{{title}}</h1>
    </div>
    <div class="content">
      {{{content}}}
    </div>
    <div class="footer">
      <p>This is an automated email. Please do not reply.</p>
      <p>&copy; {{ currentYear }} {{ appName }}. All rights reserved.</p>
    </div>
  </div>
</body>
</html>
